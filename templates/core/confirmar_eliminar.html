{% extends 'core/base.html' %}
{% block title %}Eliminar Rutina{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
        <div class="text-5xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">¿Eliminar rutina?</h1>
        <p class="text-gray-600 mb-2">Estás a punto de eliminar la rutina:</p>
        <p class="text-lg font-bold text-akela-700 mb-6">{{ rutina.nombre }}</p>
        <p class="text-red-500 text-sm mb-8">Esta acción no se puede deshacer.</p>
        <form method="POST" class="flex justify-center space-x-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-6 rounded-xl transition">Sí, eliminar</button>
            <a href="{% url 'lista_rutinas' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-xl transition">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
