{% extends 'core/base.html' %}
{% block title %}Eliminar Rutina{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-[#1e293b] border border-gray-700/50 rounded-2xl shadow-lg p-4 sm:p-8 text-center">
        <div class="mb-4 flex justify-center">
            <svg class="w-12 h-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h1 class="text-xl sm:text-2xl font-bold text-white mb-2">¿Eliminar rutina?</h1>
        <p class="text-gray-400 mb-2">Estás a punto de eliminar la rutina:</p>
        <p class="text-lg font-bold text-akela-400 mb-6">{{ rutina.nombre }}</p>
        <p class="text-red-400 text-sm mb-8">Esta acción no se puede deshacer.</p>
        <form method="POST" class="flex flex-col sm:flex-row justify-center space-y-2 sm:space-y-0 sm:space-x-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-6 rounded-xl transition">Sí, eliminar</button>
            <a href="{% url 'lista_rutinas' %}" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-6 rounded-xl transition text-center">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
