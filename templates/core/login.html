{% extends 'core/base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-[#1e293b] border border-gray-700/50 rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Iniciar Sesión</h1>
            <p class="text-gray-400 mt-2">Accede a tu cuenta de AkelaGym</p>
        </div>
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Usuario</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-4 py-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:ring-2 focus:ring-akela-500 focus:border-akela-500 outline-none transition text-white placeholder-gray-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:ring-2 focus:ring-akela-500 focus:border-akela-500 outline-none transition text-white placeholder-gray-500">
            </div>
            <button type="submit"
                class="w-full bg-akela-600 hover:bg-akela-700 text-white font-medium py-3 rounded-xl transition">
                Ingresar
            </button>
        </form>
        <p class="text-center text-gray-400 mt-6">
            ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-akela-400 hover:text-akela-300 font-medium">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}
